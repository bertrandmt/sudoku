name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (-Werror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libedit-dev
      - name: Build
        run: make

  sanitize:
    name: Sanitizer build + input smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libedit-dev
      - name: Build with ASan + UBSan
        run: |
          make clean
          make CXXFLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g -O1" \
               LDFLAGS="-fsanitize=address,undefined"
      # The realistic attack surface is the input parser (see SECURITY.md):
      # the `n.` / `n;` board loaders and the REPL command parser. Feed a range
      # of valid, malformed, truncated, oversized, and garbage inputs. With
      # -fno-sanitize-recover any memory-safety bug or undefined behavior aborts
      # the process with a nonzero exit, failing this step.
      - name: Feed adversarial inputs
        run: |
          set -e
          run() { printf '%s' "$2" | ./sudoku-solver >/dev/null; echo "ok: $1"; }
          # A solvable board, stepped a few times.
          run "valid, stepped" 'v
n.1.....569492.561.8.561.924...964.8.1.64.1....218.356.4.4.5...169.5.614.2621.....5
.
.
.
q
'
          # Row,column,value form.
          run "form-1 (rcv)" 'n;111;929;353
q
'
          run "empty after n"        'n
q
'
          run "truncated board"      'n.123
q
'
          run "oversized board"      'n.1111111111111111111111111111111111111111111111111111111111111111111111111111111111111111
q
'
          run "garbage chars"        'n.zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
q
'
          run "bad leading char"     'n@nonsense
q
'
          run "contradictory board"  'n.11.......................................................................8........
q
'
          run "unknown command"      'Z
q
'
          run "immediate quit"       'q
'
