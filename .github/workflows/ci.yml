name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Build with -Werror and run the correctness suite across multiple
    # toolchains. gcc/libstdc++ on Linux is the baseline; clang adds front-end
    # diversity; macOS exercises libc++ (the dev environment's standard library)
    # and confirms '-ledit' still links there. This is the guard against the
    # libstdc++-vs-libc++ portability fixes that have landed after the fact.
    name: Build & test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # Backstop against a hang (e.g. an analyzer that loops forever): without it a
    # stuck step burns to GitHub's 6-hour default and fails as an opaque cancel.
    # run.sh also guards each solver call with `timeout` on Linux; this covers
    # every step (build included) and the macOS leg where `timeout` is absent.
    timeout-minutes: 10
    strategy:
      fail-fast: false   # one toolchain failing must not mask the others
      matrix:
        include:
          - { name: linux-gcc,   os: ubuntu-latest, cxx: g++,     install: "sudo apt-get update && sudo apt-get install -y libedit-dev" }
          - { name: linux-clang, os: ubuntu-latest, cxx: clang++, install: "sudo apt-get update && sudo apt-get install -y libedit-dev" }
          - { name: macos-clang, os: macos-latest,  cxx: clang++, install: "true" }   # libedit ships with macOS
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: ${{ matrix.install }}
      - name: Build
        run: make CXX=${{ matrix.cxx }}
      - name: Run black-box correctness tests
        run: ./tests/run.sh
      - name: Run whitebox unit tests
        run: make CXX=${{ matrix.cxx }} unit

  sanitize:
    name: Sanitizer build + input smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10   # same hang backstop as the build job
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libedit-dev
      - name: Build with ASan + UBSan
        run: |
          make clean
          make CXXFLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g -O1" \
               LDFLAGS="-fsanitize=address,undefined"
      # The realistic attack surface is the input parser (see SECURITY.md):
      # the `n.` / `n;` board loaders and the REPL command parser. Feed a range
      # of valid, malformed, truncated, oversized, and garbage inputs. With
      # -fno-sanitize-recover any memory-safety bug or undefined behavior aborts
      # the process with a nonzero exit, failing this step.
      # Each input is a single line; \n escapes are expanded by printf '%b' so
      # nothing breaks out of the YAML block scalar.
      - name: Feed adversarial inputs
        run: |
          set -e
          run() { printf '%b' "$2" | ./sudoku-solver >/dev/null; echo "ok: $1"; }
          oversized="n.$(printf '1%.0s' $(seq 90))\nq\n"
          garbage="n.$(printf 'z%.0s' $(seq 81))\nq\n"
          run "valid, stepped"      'v\nn.1.....569492.561.8.561.924...964.8.1.64.1....218.356.4.4.5...169.5.614.2621.....5\n.\n.\n.\nq\n'
          run "form-1 (rcv)"        'n;111;929;353\nq\n'
          run "empty after n"       'n\nq\n'
          run "truncated board"     'n.123\nq\n'
          run "oversized board"     "$oversized"
          run "garbage chars"       "$garbage"
          run "bad leading char"    'n@nonsense\nq\n'
          run "contradictory board" 'n.11.......................................................................8........\nq\n'
          run "unknown command"     'Z\nq\n'
          run "immediate quit"      'q\n'
      # Correctness tests, run against the sanitizer build so a real solve that
      # trips ASan/UBSan also fails here.
      - name: Run black-box correctness tests
        run: ./tests/run.sh
      # The whitebox tests drive the analyzer on hand-built positions; running
      # them sanitized puts ASan/UBSan on those paths too. Same flags as the
      # build step so the test binary links the sanitizer runtime.
      - name: Run whitebox unit tests
        run: |
          make CXXFLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g -O1" \
               LDFLAGS="-fsanitize=address,undefined" unit

  coverage:
    name: Coverage (gcov/gcovr)
    runs-on: ubuntu-latest
    timeout-minutes: 10   # same hang backstop as the other jobs
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libedit-dev gcovr
      # '--coverage' (make coverage=1) instruments every translation unit; the
      # test run below then writes the .gcda execution counts that gcovr reads.
      - name: Build with coverage instrumentation
        run: |
          make clean
          make coverage=1
      - name: Run correctness tests (records coverage data)
        run: ./tests/run.sh
      # The whitebox unit tests share the same instrumented objects, so running
      # them accumulates into the same .gcda counts -- without this the
      # column-based Swordfish path reads as cold in the report.
      - name: Run whitebox unit tests (records coverage data)
        run: make coverage=1 unit
      # This job is a *signal*, not a gate: it reports which lines and branches
      # the test corpus exercises so cold analyzer paths (detected/untested vs.
      # dead) are visible, but it does not fail on a coverage threshold. The
      # per-file table and an HTML drill-down are uploaded as an artifact.
      - name: Report coverage
        run: |
          gcovr --root . --exclude tests --print-summary --txt -o coverage.txt
          gcovr --root . --exclude tests --html --html-details -o coverage.html
          echo '===== per-file line / branch coverage ====='
          cat coverage.txt
      - name: Upload coverage report
        if: always()   # publish the report even if a prior step failed
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.txt
            coverage*.html
            coverage*.css
